<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同期カウントダウンタイマー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="video-container">
    <video id="video" preload="auto" playsinline muted loop>
      <source src="bg-movie-countdown01.mp4" type="video/mp4">
    </video>
  </div>

  <div id="fallback-countdown"></div>

  <!-- モバイルAutoplay制限回避用オーバーレイ -->
  <div id="tap-overlay" class="hidden">
    <div class="tap-icon">▶</div>
    <div class="tap-text">タップして開始</div>
  </div>

  <button id="fullscreen-btn">⛶ フルスクリーン</button>
  <button id="mute-btn">� 音声OFF（クリックでON）</button>  <button id="video-toggle-btn" class="hidden">🎬 動画を再生: ON</button>
  <div class="overlay">
    <div id="status">待機中...</div>
    <div id="next-start"></div>
    <div id="clock"></div>
    <div id="system-clock"></div>
    <div id="ntp-offset"></div>
    <div id="ntp-rtt"></div>
  </div>

  <div id="info">
    NTP (ntp.nict.jp) 補正時刻で同期 ｜ 毎分 :20 と :50 に動画再生開始
  </div>

  <script src="app.js"></script>
</body>
</html>
