<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同期カウントダウンタイマー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    #video-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }

    #video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .overlay {
      position: relative;
      z-index: 1;
      text-align: center;
      pointer-events: none;
    }

    #status {
      font-size: 1.5rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
      min-height: 2rem;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    #clock {
      font-size: 3rem;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.05em;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    #clock .ms {
      font-size: 1.5rem;
      color: rgba(255,255,255,0.4);
    }

    #next-start {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.5rem;
      min-height: 1.5rem;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    #info {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: #555;
      text-align: center;
      z-index: 2;
    }

    /* フルスクリーンボタン */
    #fullscreen-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #aaa;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    #fullscreen-btn:hover {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* ミュートボタン */
    #mute-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 10;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #aaa;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    #mute-btn:hover {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* タップして開始オーバーレイ（モバイル用） */
    #tap-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      cursor: pointer;
    }

    #tap-overlay.hidden {
      display: none;
    }

    #tap-overlay .tap-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    #tap-overlay .tap-text {
      font-size: 1.5rem;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.1em;
    }

    /* フォールバックカウントダウン表示 */
    #fallback-countdown {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      font-size: 30vw;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 0 60px rgba(255, 255, 255, 0.5),
                   0 0 100px rgba(255, 255, 255, 0.3);
      pointer-events: none;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* カウントダウン終了時のフラッシュ */
    body.countdown-zero {
      background: #fff !important;
    }

    body.countdown-zero #fallback-countdown {
      color: rgba(0, 0, 0, 0.9);
      text-shadow: none;
    }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video" preload="auto" playsinline muted loop>
      <source src="bg-movie-countdown01.mp4" type="video/mp4">
    </video>
  </div>

  <div id="fallback-countdown"></div>

  <!-- モバイルAutoplay制限回避用オーバーレイ -->
  <div id="tap-overlay" class="hidden">
    <div class="tap-icon">▶</div>
    <div class="tap-text">タップして開始</div>
  </div>

  <button id="fullscreen-btn">⛶ フルスクリーン</button>
  <button id="mute-btn">� 音声OFF（クリックでON）</button>

  <div class="overlay">
    <div id="status">待機中...</div>
    <div id="next-start"></div>
    <div id="clock"></div>
  </div>

  <div id="info">
    システム時刻で同期 ｜ 毎分 :20 と :50 に動画再生開始
  </div>

  <script>
    // ===== DOM references =====
    const video              = document.getElementById('video');
    const statusEl           = document.getElementById('status');
    const clockEl            = document.getElementById('clock');
    const nextStartEl        = document.getElementById('next-start');
    const fullscreenBtn      = document.getElementById('fullscreen-btn');
    const muteBtn            = document.getElementById('mute-btn');
    const fallbackCountdownEl = document.getElementById('fallback-countdown');
    const tapOverlay  = document.getElementById('tap-overlay');

    // ===== State =====
    let isPlaying       = false;   // 動画再生中フラグ
    let isMuted         = true;    // 初期はmuted（自動再生のため）
    let videoAvailable  = true;    // 動画ファイルの存在フラグ
    let fallbackBeepSec = -1;      // フォールバック時の直前ビープカウント値
    let fallbackWasActive = false; // フォールバック前フレームの再生区間内フラグ
    let fallbackZeroUntil = 0;     // "0" 表示終了時刻（ms）
    let audioCtx        = null;    // Web Audio API コンテキスト

    // ===== Web Audio API (フォールバック用ビープ) =====
    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
      }
      return audioCtx;
    }

    function playBeep(freq, dur) {
      if (isMuted) return;
      try {
        const ctx = getAudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + dur);
      } catch (e) {}
    }

    // ===== 動画読み込みエラー検出 =====
    const sourceEl = video.querySelector('source');
    if (sourceEl) sourceEl.addEventListener('error', () => { videoAvailable = false; });
    video.addEventListener('error', () => { videoAvailable = false; });
    video.addEventListener('loadedmetadata', () => { videoAvailable = true; });
    let videoUnlocked = false; // ユーザージェスチャーで再生が許可されたか
    let videoStarted  = false; // video.play() が一度でも成功したか

    // ===== 動画を開始（一度だけ呼ぶ。以後 pause しない） =====
    function startVideoOnce() {
      if (videoStarted) return;
      const p = video.play();
      if (p !== undefined) {
        p.then(() => {
          videoStarted = true;
          videoUnlocked = true;
          video.style.visibility = 'hidden'; // 最初は隠す（待機中かもしれないため）
        }).catch(() => {
          // Autoplay 失敗 → タップオーバーレイを表示
          tapOverlay.classList.remove('hidden');
        });
      }
    }

    // ===== Autoplay検出 =====
    function checkAutoplay() {
      startVideoOnce();
    }

    // タップでオーバーレイを閉じ、動画を有効化
    tapOverlay.addEventListener('click', () => {
      video.play().then(() => {
        videoStarted = true;
        videoUnlocked = true;
        video.style.visibility = 'hidden';
        tapOverlay.classList.add('hidden');
      }).catch(() => {});
    });

    // ===== Main loop =====
    function update() {
      const now = new Date();
      const sec = now.getSeconds();
      const ms  = now.getMilliseconds();

      // 現在時刻を表示
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(sec).padStart(2, '0');
      const msStr = String(ms).padStart(3, '0');
      clockEl.innerHTML = `${hh}:${mm}:${ss}<span class="ms">.${msStr}</span>`;

      // 再生開始秒のリスト
      const START_SECS = [20, 50];
      const duration = video.duration || 10; // 動画の実際の長さ（読込前はフォールバック）

      // 現在の秒が再生区間内かを判定
      let activeStart = -1;
      for (const s of START_SECS) {
        const end = s + duration;
        if (end <= 60) {
          if (sec >= s && sec < end) { activeStart = s; break; }
        } else {
          if (sec >= s || sec < end - 60) { activeStart = s; break; }
        }
      }

      if (activeStart >= 0) {
        // ===== 再生区間 =====
        let elapsed;
        if (sec >= activeStart) {
          elapsed = (sec - activeStart) + ms / 1000;
        } else {
          // 分をまたいだ場合
          elapsed = (sec + 60 - activeStart) + ms / 1000;
        }

        if (videoAvailable) {
          // ===== 動画再生 =====
          // 動画を表示
        video.style.visibility = 'visible';

        // まだ play() していなければ開始を試みる
        if (!videoStarted) {
          startVideoOnce();
        }

        // currentTime を同期（大きなドリフト時のみシーク）
        if (!isPlaying) {
            video.currentTime = elapsed;
              isPlaying = true;
          } else {
            const drift = Math.abs(video.currentTime - elapsed);
            if (drift > 0.5) {
              video.currentTime = elapsed;
            }
          }
          fallbackCountdownEl.textContent = '';
          document.body.classList.remove('countdown-zero');
        } else {
          // ===== フォールバック: 動画なし =====
          if (isPlaying) {
            video.pause();
            video.currentTime = 0;
            isPlaying = false;
          }
          const countdownNum = Math.max(1, 10 - Math.floor(elapsed));
          fallbackCountdownEl.textContent = String(countdownNum);
          if (countdownNum !== fallbackBeepSec) {
            fallbackBeepSec = countdownNum;
            playBeep(880, 0.15);
          }
          document.body.classList.remove('countdown-zero');
          fallbackWasActive = true;
        }

        // 動画が止まっていたら再開（バッテリー節約等で止まった場合）
        if (videoStarted && video.paused) {
          video.play().catch(() => {});
        }

        statusEl.textContent = '▶ カウントダウン再生中';
        nextStartEl.textContent = '';

      } else {
        // ===== 待機中 =====
        // pause() は呼ばない — モバイルで再開できなくなるため
        // 動画を非表示にして裏で回し続ける
        video.style.visibility = 'hidden';
        isPlaying = false;

        // フォールバック: カウントダウン終了 → "0" 表示とフラッシュ
        if (!videoAvailable && fallbackWasActive) {
          fallbackWasActive = false;
          fallbackBeepSec = -1;
          fallbackZeroUntil = Date.now() + 1500;
          playBeep(1320, 0.5);
        }

        if (!videoAvailable && Date.now() < fallbackZeroUntil) {
          fallbackCountdownEl.textContent = '0';
          document.body.classList.add('countdown-zero');
          statusEl.textContent = '▶ カウントダウン再生中';
          nextStartEl.textContent = '';
        } else {
          fallbackCountdownEl.textContent = '';
          document.body.classList.remove('countdown-zero');

          // 次の再生開始までの秒数を計算
          let minWait = 60;
          for (const s of START_SECS) {
            const wait = (s - sec + 60) % 60;
            if (wait > 0 && wait < minWait) minWait = wait;
          }
          statusEl.textContent = '待機中...';
          nextStartEl.textContent = `次のカウントダウンまで ${minWait} 秒`;
        }
      }

      requestAnimationFrame(update);
    }

    // ===== Fullscreen =====
    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
        fullscreenBtn.textContent = '⛶ ウィンドウ';
      } else {
        document.exitFullscreen();
        fullscreenBtn.textContent = '⛶ フルスクリーン';
      }
    });

    // ===== Mute =====
    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      video.muted = isMuted;
      muteBtn.textContent = isMuted ? '🔇 音声OFF（クリックでON）' : '🔊 音声ON';
      if (!isMuted) getAudioContext(); // AudioContext を起動（ユーザー操作後に有効）
    });

    // ===== Start =====
    checkAutoplay();
    requestAnimationFrame(update);
  </script>
</body>
</html>
